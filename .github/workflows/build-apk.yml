name: Build Android APK

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths-ignore:
      - '.github/workflows/**'

jobs:
  build-apk:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Create Android Project
        run: |
          mkdir -p android-app/app/src/main/java/app/studytracker
          mkdir -p android-app/app/src/main/res/values
          mkdir -p android-app/app/src/main/res/drawable
          mkdir -p android-app/app/src/main/res/mipmap-hdpi
          mkdir -p android-app/app/src/main/res/mipmap-mdpi
          mkdir -p android-app/app/src/main/res/mipmap-xhdpi
          mkdir -p android-app/app/src/main/res/mipmap-xxhdpi
          mkdir -p android-app/app/src/main/res/mipmap-xxxhdpi
          mkdir -p android-app/app/src/main/res/layout
          mkdir -p android-app/gradle/wrapper

      - name: Download App Icon
        run: |
          curl -L "https://study-tracker-two-xi.vercel.app/icon-512x512.png" -o android-app/app/src/main/res/mipmap-xxxhdpi/ic_launcher.png
          curl -L "https://study-tracker-two-xi.vercel.app/icon-192x192.png" -o android-app/app/src/main/res/mipmap-xxhdpi/ic_launcher.png
          cp android-app/app/src/main/res/mipmap-xxhdpi/ic_launcher.png android-app/app/src/main/res/mipmap-xhdpi/ic_launcher.png
          cp android-app/app/src/main/res/mipmap-xxhdpi/ic_launcher.png android-app/app/src/main/res/mipmap-hdpi/ic_launcher.png
          cp android-app/app/src/main/res/mipmap-xxhdpi/ic_launcher.png android-app/app/src/main/res/mipmap-mdpi/ic_launcher.png

      - name: Create MainActivity.java
        run: |
          cat > android-app/app/src/main/java/app/studytracker/MainActivity.java << 'JAVAEOF'
          package app.studytracker;

          import android.app.Activity;
          import android.graphics.Color;
          import android.os.Bundle;
          import android.view.View;
          import android.view.Window;
          import android.view.WindowManager;
          import android.webkit.WebChromeClient;
          import android.webkit.WebSettings;
          import android.webkit.WebView;
          import android.webkit.WebViewClient;
          import android.widget.ProgressBar;
          import android.widget.RelativeLayout;

          public class MainActivity extends Activity {
              private WebView webView;

              @Override
              protected void onCreate(Bundle savedInstanceState) {
                  super.onCreate(savedInstanceState);

                  requestWindowFeature(Window.FEATURE_NO_TITLE);
                  getWindow().setFlags(
                      WindowManager.LayoutParams.FLAG_FULLSCREEN,
                      WindowManager.LayoutParams.FLAG_FULLSCREEN
                  );
                  getWindow().setStatusBarColor(Color.parseColor("#0B0E14"));
                  getWindow().setNavigationBarColor(Color.parseColor("#0B0E14"));

                  RelativeLayout layout = new RelativeLayout(this);
                  layout.setBackgroundColor(Color.parseColor("#0B0E14"));

                  webView = new WebView(this);
                  WebSettings settings = webView.getSettings();
                  settings.setJavaScriptEnabled(true);
                  settings.setDomStorageEnabled(true);
                  settings.setDatabaseEnabled(true);
                  settings.setCacheMode(WebSettings.LOAD_DEFAULT);
                  settings.setAllowFileAccess(true);
                  settings.setMediaPlaybackRequiresUserGesture(false);
                  settings.setMixedContentMode(WebSettings.MIXED_CONTENT_ALWAYS_ALLOW);
                  settings.setUseWideViewPort(true);
                  settings.setLoadWithOverviewMode(true);

                  webView.setWebViewClient(new WebViewClient() {
                      @Override
                      public boolean shouldOverrideUrlLoading(WebView view, String url) {
                          if (url.contains("study-tracker-two-xi.vercel.app")) {
                              view.loadUrl(url);
                              return true;
                          }
                          return false;
                      }
                  });

                  webView.setWebChromeClient(new WebChromeClient());
                  webView.setBackgroundColor(Color.parseColor("#0B0E14"));

                  RelativeLayout.LayoutParams webParams = new RelativeLayout.LayoutParams(
                      RelativeLayout.LayoutParams.MATCH_PARENT,
                      RelativeLayout.LayoutParams.MATCH_PARENT
                  );
                  layout.addView(webView, webParams);

                  setContentView(layout);
                  webView.loadUrl("https://study-tracker-two-xi.vercel.app/");
              }

              @Override
              public void onBackPressed() {
                  if (webView != null && webView.canGoBack()) {
                      webView.goBack();
                  } else {
                      super.onBackPressed();
                  }
              }
          }
          JAVAEOF

      - name: Create AndroidManifest.xml
        run: |
          cat > android-app/app/src/main/AndroidManifest.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <manifest xmlns:android="http://schemas.android.com/apk/res/android"
              package="app.studytracker">

              <uses-permission android:name="android.permission.INTERNET" />
              <uses-permission android:name="android.permission.ACCESS_NETWORK_STATE" />

              <application
                  android:allowBackup="true"
                  android:icon="@mipmap/ic_launcher"
                  android:label="Study Tracker"
                  android:usesCleartextTraffic="true"
                  android:hardwareAccelerated="true">

                  <activity
                      android:name=".MainActivity"
                      android:exported="true"
                      android:screenOrientation="portrait"
                      android:configChanges="orientation|screenSize|keyboardHidden"
                      android:windowSoftInputMode="adjustResize">
                      <intent-filter>
                          <action android:name="android.intent.action.MAIN" />
                          <category android:name="android.intent.category.LAUNCHER" />
                      </intent-filter>
                  </activity>
              </application>
          </manifest>
          EOF

      - name: Create build files
        run: |
          # settings.gradle
          cat > android-app/settings.gradle << 'EOF'
          pluginManagement {
              repositories {
                  google()
                  mavenCentral()
                  gradlePluginPortal()
              }
          }
          dependencyResolutionManagement {
              repositoriesMode.set(RepositoriesMode.FAIL_ON_PROJECT_REPOS)
              repositories {
                  google()
                  mavenCentral()
              }
          }
          rootProject.name = "StudyTracker"
          include ':app'
          EOF

          # build.gradle (root)
          cat > android-app/build.gradle << 'EOF'
          plugins {
              id 'com.android.application' version '8.2.0' apply false
          }
          EOF

          # app/build.gradle
          cat > android-app/app/build.gradle << 'EOF'
          plugins {
              id 'com.android.application'
          }

          android {
              namespace 'app.studytracker'
              compileSdk 34

              defaultConfig {
                  applicationId "app.studytracker"
                  minSdk 24
                  targetSdk 34
                  versionCode 1
                  versionName "1.0.0"
              }

              buildTypes {
                  release {
                      minifyEnabled false
                  }
              }

              compileOptions {
                  sourceCompatibility JavaVersion.VERSION_17
                  targetCompatibility JavaVersion.VERSION_17
              }
          }
          EOF

          # gradle.properties
          cat > android-app/gradle.properties << 'EOF'
          android.useAndroidX=true
          org.gradle.jvmargs=-Xmx2048m
          EOF

          # gradle-wrapper.properties
          cat > android-app/gradle/wrapper/gradle-wrapper.properties << 'EOF'
          distributionBase=GRADLE_USER_HOME
          distributionPath=wrapper/dists
          distributionUrl=https\://services.gradle.org/distributions/gradle-8.5-bin.zip
          zipStoreBase=GRADLE_USER_HOME
          zipStorePath=wrapper/dists
          EOF

      - name: Build APK
        working-directory: android-app
        run: |
          gradle wrapper --gradle-version 8.5
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon

      - name: Copy APK
        run: |
          cp android-app/app/build/outputs/apk/debug/app-debug.apk ./StudyTracker.apk

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: StudyTracker-APK
          path: StudyTracker.apk
