name: Build Android APK

on:
  workflow_dispatch:  # Manual trigger from GitHub
  push:
    branches: [main]

jobs:
  build-apk:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Bubblewrap
        run: npm install -g @nicolo-ribaudo/fetch-and-run @nicolo-ribaudo/chokidar @nicolo-ribaudo/recursive-readdir && npm install -g @nicolo-ribaudo/bubblewrap || npm install -g @nicolo-ribaudo/fetch-and-run && npm install -g @nicolo-ribaudo/bubblewrap || npm install -g @nicolo-ribaudo/bubblewrap || true

      - name: Create TWA project
        run: |
          mkdir -p twa-build && cd twa-build
          
          # Create twa-manifest.json
          cat > twa-manifest.json << 'EOF'
          {
            "packageId": "app.vercel.study_tracker_two_xi",
            "host": "study-tracker-two-xi.vercel.app",
            "name": "Study Tracker",
            "launcherName": "Study Tracker",
            "display": "standalone",
            "themeColor": "#0B0E14",
            "navigationColor": "#0B0E14",
            "backgroundColor": "#0B0E14",
            "enableNotifications": false,
            "startUrl": "/",
            "iconUrl": "https://study-tracker-two-xi.vercel.app/icon-512x512.png",
            "maskableIconUrl": "https://study-tracker-two-xi.vercel.app/icon-512x512.png",
            "shortcuts": [],
            "signingKey": {
              "path": "./study-tracker.keystore",
              "alias": "study-tracker"
            },
            "appVersionCode": 1,
            "appVersionName": "1.0.0",
            "splashScreenFadeOutDuration": 300,
            "enableSiteSettingsShortcut": true,
            "isChromeOSOnly": false,
            "orientation": "portrait",
            "fingerprints": []
          }
          EOF

      - name: Build APK with Gradle
        run: |
          mkdir -p twa-build && cd twa-build
          
          # Create a minimal TWA Android project
          mkdir -p app/src/main/res/values
          mkdir -p app/src/main/res/mipmap-xxxhdpi
          mkdir -p app/src/main/java/app/vercel/study_tracker_two_xi
          mkdir -p gradle/wrapper
          
          # Download icon
          curl -L "https://study-tracker-two-xi.vercel.app/icon-512x512.png" -o app/src/main/res/mipmap-xxxhdpi/ic_launcher.png
          
          # Create strings.xml
          cat > app/src/main/res/values/strings.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <resources>
              <string name="app_name">Study Tracker</string>
              <string name="asset_statements">[{"relation": ["delegate_permission/common.handle_all_urls"], "target": {"namespace": "web", "site": "https://study-tracker-two-xi.vercel.app"}}]</string>
          </resources>
          EOF
          
          # Create colors.xml
          cat > app/src/main/res/values/colors.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <resources>
              <color name="colorPrimary">#0B0E14</color>
              <color name="colorPrimaryDark">#0B0E14</color>
              <color name="navigationColor">#0B0E14</color>
              <color name="navigationColorDark">#0B0E14</color>
              <color name="navigationDividerColor">#0B0E14</color>
              <color name="backgroundColor">#0B0E14</color>
          </resources>
          EOF
          
          # Create styles.xml
          cat > app/src/main/res/values/styles.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <resources>
              <style name="Theme.StudyTracker" parent="Theme.AppCompat.NoActionBar">
                  <item name="android:windowBackground">@color/backgroundColor</item>
                  <item name="colorPrimary">@color/colorPrimary</item>
              </style>
          </resources>
          EOF
          
          # Create AndroidManifest.xml
          cat > app/src/main/AndroidManifest.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <manifest xmlns:android="http://schemas.android.com/apk/res/android"
              package="app.vercel.study_tracker_two_xi">
              
              <uses-permission android:name="android.permission.INTERNET" />
              
              <application
                  android:allowBackup="true"
                  android:icon="@mipmap/ic_launcher"
                  android:label="@string/app_name"
                  android:theme="@style/Theme.StudyTracker"
                  android:usesCleartextTraffic="true">
                  
                  <meta-data
                      android:name="asset_statements"
                      android:resource="@string/asset_statements" />
                  
                  <activity
                      android:name="android.browser.customtabs.CustomTabActivity"
                      android:exported="true">
                      <intent-filter>
                          <action android:name="android.intent.action.MAIN" />
                          <category android:name="android.intent.category.LAUNCHER" />
                      </intent-filter>
                      <intent-filter android:autoVerify="true">
                          <action android:name="android.intent.action.VIEW" />
                          <category android:name="android.intent.category.DEFAULT" />
                          <category android:name="android.intent.category.BROWSABLE" />
                          <data android:scheme="https" android:host="study-tracker-two-xi.vercel.app" />
                      </intent-filter>
                  </activity>
              </application>
          </manifest>
          EOF
          
          # Create LauncherActivity.java
          cat > app/src/main/java/app/vercel/study_tracker_two_xi/LauncherActivity.java << 'EOF'
          package app.vercel.study_tracker_two_xi;
          
          import android.app.Activity;
          import android.content.Intent;
          import android.net.Uri;
          import android.os.Bundle;
          
          public class LauncherActivity extends Activity {
              @Override
              protected void onCreate(Bundle savedInstanceState) {
                  super.onCreate(savedInstanceState);
                  Intent intent = new Intent(Intent.ACTION_VIEW, Uri.parse("https://study-tracker-two-xi.vercel.app/"));
                  intent.addFlags(Intent.FLAG_ACTIVITY_NEW_TASK);
                  startActivity(intent);
                  finish();
              }
          }
          EOF
          
          # Create build.gradle (project)
          cat > build.gradle << 'EOF'
          buildscript {
              repositories {
                  google()
                  mavenCentral()
              }
              dependencies {
                  classpath 'com.android.tools.build:gradle:8.2.0'
              }
          }
          
          allprojects {
              repositories {
                  google()
                  mavenCentral()
              }
          }
          EOF
          
          # Create app/build.gradle
          cat > app/build.gradle << 'EOF'
          plugins {
              id 'com.android.application'
          }
          
          android {
              namespace 'app.vercel.study_tracker_two_xi'
              compileSdk 34
              
              defaultConfig {
                  applicationId "app.vercel.study_tracker_two_xi"
                  minSdk 24
                  targetSdk 34
                  versionCode 1
                  versionName "1.0.0"
              }
              
              buildTypes {
                  release {
                      minifyEnabled false
                  }
                  debug {
                      minifyEnabled false
                  }
              }
              
              compileOptions {
                  sourceCompatibility JavaVersion.VERSION_17
                  targetCompatibility JavaVersion.VERSION_17
              }
          }
          
          dependencies {
              implementation 'androidx.appcompat:appcompat:1.6.1'
              implementation 'androidx.browser:browser:1.7.0'
          }
          EOF
          
          # Create settings.gradle
          cat > settings.gradle << 'EOF'
          pluginManagement {
              repositories {
                  google()
                  mavenCentral()
                  gradlePluginPortal()
              }
          }
          rootProject.name = "StudyTracker"
          include ':app'
          EOF
          
          # Create gradle.properties
          cat > gradle.properties << 'EOF'
          android.useAndroidX=true
          org.gradle.jvmargs=-Xmx2048m
          EOF
          
          # Download Gradle wrapper
          curl -L "https://services.gradle.org/distributions/gradle-8.5-bin.zip" -o gradle-8.5-bin.zip
          mkdir -p gradle/wrapper
          cat > gradle/wrapper/gradle-wrapper.properties << 'EOF'
          distributionBase=GRADLE_USER_HOME
          distributionPath=wrapper/dists
          distributionUrl=https\://services.gradle.org/distributions/gradle-8.5-bin.zip
          zipStoreBase=GRADLE_USER_HOME
          zipStorePath=wrapper/dists
          EOF
          
          # Use gradle directly
          gradle wrapper --gradle-version 8.5 || true
          
          # Build debug APK
          chmod +x gradlew 2>/dev/null || true
          ./gradlew assembleDebug --no-daemon 2>&1 || gradle assembleDebug --no-daemon 2>&1
          
          # Find and copy APK
          find . -name "*.apk" -exec cp {} ../study-tracker.apk \;

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Study-Tracker-APK
          path: study-tracker.apk
          if-no-files-found: warn
